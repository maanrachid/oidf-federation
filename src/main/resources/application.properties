spring.application.name=federation

# Entity ID for the OpenID Federation entity statement
federation.entity-id=http://localhost:8080

# Signing credential loaded via SwedenConnect credentials-support
credential.bundles.pem.federation-signing.public-key=classpath:keys/federation-signing.pub
credential.bundles.pem.federation-signing.private-key=classpath:keys/federation-signing.key
credential.bundles.pem.federation-signing.name=Federation Signing
credential.bundles.pem.federation-signing.key-id=federation-signing-key
credential.bundles.pem.federation-signing.metadata.usage=signing

# Actuator health endpoint configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
